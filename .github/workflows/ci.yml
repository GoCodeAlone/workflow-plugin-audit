name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: GOWORK=off go build ./...
      - run: GOWORK=off go test ./... -v -race -count=1
      - run: GOWORK=off go vet ./...
